name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
      - name: Build web library
        working-directory: web
        run: |
          bun install
          bun run build

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Render plugin template
        run: |
          ./plugin-template/render.sh "$RUNNER_TEMP/pack-smoke" \
            PLUGIN_NAME=echo-demo DISPLAY_NAME=EchoDemo BINARY_NAME=echo-demo \
            RELEASE_REPO=yasyf/echo-demo MCP_SUBCOMMAND=channel SKILL_NAME=start

      - name: Test inline hooks
        run: |
          CLAUDE_CONFIG_DIR="$RUNNER_TEMP/pack-smoke/.claude-test" \
            uvx --isolated --from 'capt-hook>=11.0.0' capt-hook \
              --root "$RUNNER_TEMP/pack-smoke" \
              --hooks "$RUNNER_TEMP/pack-smoke/hooks" test

      - name: Test hook contracts
        run: uv run "$RUNNER_TEMP/pack-smoke/hooks/tests/test_pack.py"
