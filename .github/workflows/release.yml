name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: bunx vite build
      - name: Publish @cc-interact/react (skips versions already on npm)
        run: |
          version=$(jq -r .version package.json)
          if npm view "@cc-interact/react@${version}" version >/dev/null 2>&1; then
            echo "@cc-interact/react@${version} already published; skipping"
            exit 0
          fi
          npm publish --access public
